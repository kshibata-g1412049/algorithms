# rrt_cli用のサンプル設定ファイル（RRT/Goal-biased RRT/RRT*/RRT-Connect/Informed RRT*）。
# 使い方: rrt_cli rrt_star cli/configs/rrt_example.yaml
start: [1.0, 1.0]
goal: [9.0, 9.0]
bounds: [0.0, 0.0, 10.0, 10.0]   # xmin, ymin, xmax, ymax
goal_radius: 0.5
step_size: 0.5
max_iterations: 5000
seed: 42                          # 省略可（省略時はランダムなシードを使用）
obstacles:
  - center: [5.0, 5.0]
    radius: 1.0
