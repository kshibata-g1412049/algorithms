name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          make
      - name: Run ctest
        run: ctest --test-dir build --output-on-failure

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest sorting/ -v

  matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends octave
      - name: Run MATLAB/Octave tests
        run: |
          set -e
          for dir in sorting/*/matlab; do
            algo=$(basename "$(dirname "$dir")")
            echo "::group::${algo}"
            (cd "$dir" && octave --no-gui --eval "test_${algo}")
            echo "::endgroup::"
          done
